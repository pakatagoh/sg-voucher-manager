name: Build and Publish Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # Compute a single image tag per build: <epoch-millis>-<short-sha>
      #   epoch-millis: UTC Unix epoch in milliseconds (`date -u +%s%3N`)
      #   short-sha:    first 7 chars of the commit SHA
      # Millisecond granularity keeps tags unique across concurrent builds
      # and makes them monotonic across history.
      # ----------------------------------------------------------------
      - name: Compute image tag
        id: image_tag
        run: |
          echo "tag=$(date -u +%s%3N)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "Computed image tag: $(date -u +%s%3N)-${GITHUB_SHA::7}"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/pakatagoh/sg-voucher-manager:${{ steps.image_tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------------------------------
      # Retention: keep only the most recent N image versions to stay
      # under the GHCR free-tier storage quota (500 MB shared).
      # NOTE: public packages with >5,000 downloads can't be API-deleted,
      # so this only prunes early/unused tags. Harmless for a personal app.
      # ----------------------------------------------------------------
      - name: Prune old image versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: "10"
          PACKAGE: sg-voucher-manager
        run: |
          set -euo pipefail

          # List every version with its tags and creation date.
          versions=$(gh api --paginate \
              "/user/packages/container/${PACKAGE}/versions" \
              --jq '[.[] | {id, created_at, tags: (.metadata.container.tags // [])}]' \
              2>/dev/null || echo "[]")

          if [[ "$versions" == "[]" ]]; then
            echo "No versions found (first run?). Skipping prune."
            exit 0
          fi

          # Everything older than the newest KEEP versions.
          to_delete=$(echo "$versions" \
            | jq -r --argjson keep "$KEEP" \
              'sort_by(.created_at) | reverse | .[$keep:] | .[].id')

          if [[ -z "${to_delete}" ]]; then
            echo "Nothing to prune (≤ ${KEEP} versions)."
            exit 0
          fi

          for id in $to_delete; do
            echo "Deleting version ${id}..."
            gh api -X DELETE "/user/packages/container/${PACKAGE}/versions/${id}"
          done
          echo "Prune complete."
